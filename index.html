<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="MentorMatch – Connect with industry experts through intelligent skill-based matching." />
    <meta name="theme-color" content="#6366f1" />
    <title>MentorMatch – Premium Mentorship Marketplace</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body { background: #0f172a; font-family: 'Inter', system-ui, sans-serif; }
      #root { min-height: 100vh; }
      #loading-screen {
        position: fixed; inset: 0;
        background: #0f172a;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        gap: 1rem; z-index: 9999;
        transition: opacity 0.4s ease;
      }
      .loader-ring {
        width: 48px; height: 48px;
        border: 3px solid rgba(99,102,241,0.2);
        border-top-color: #6366f1;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      .loader-text { color: #94a3b8; font-size: 0.9rem; letter-spacing: 0.05em; }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="loading-screen">
      <div class="loader-ring"></div>
      <span class="loader-text">Loading MentorMatch…</span>
    </div>
    <div id="root"></div>
    <script>
      // Hide loading screen once React mounts
      document.addEventListener('DOMContentLoaded', () => {
        const screen = document.getElementById('loading-screen');
        if (screen) {
          setTimeout(() => { screen.style.opacity = '0'; setTimeout(() => screen.remove(), 400); }, 600);
        }
      });
    </script>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
