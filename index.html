<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MentorMatch | Professional Mentorship</title>
    <meta name="description" content="Connect with expert mentors to boost your learning and career">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/style.css">
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    
    <nav class="navbar glass">
        <div class="nav-container">
            <h1 class="logo">Mentor<span>Match</span></h1>
            <div class="nav-links">
                <a href="#" class="active">Find Mentors</a>
                <a href="#">My Sessions</a>
                <button class="btn-outline">Profile</button>
            </div>
        </div>
    </nav>

    <header class="hero">
        <div class="hero-content">
            <div class="badge-pill animate-up">v2.0 Beta Live</div>
            <h2 class="animate-up delay-1">Accelerate Your Learning</h2>
            <p class="animate-up delay-2">Connect with industry experts who have been in your shoes. Get personalized guidance to reach your goals faster.</p>
            
            <div class="search-bar glass animate-up delay-3">
                <input type="text" id="searchInput" placeholder="What skill do you want to master? (e.g., React, Python)">
                <button id="searchBtn" class="btn-primary">Find Match</button>
            </div>
            
            <div class="filters animate-up delay-4">
                <button class="filter-btn active" data-level="ALL">All Mentors</button>
                <button class="filter-btn" data-level="HIGH_RATED">Top Rated</button>
                <button class="filter-btn" data-level="VERIFIED">Verified Only</button>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="section-header">
            <h3>Recommended Matches</h3>
            <span class="badge" id="mentorCount">Searching...</span>
        </div>
        
        <div class="mentors-grid" id="mentorsGrid">
            <!-- Mentor cards will be injected here via JS -->
            <div class="loader">Calibrating match scores...</div>
        </div>
    </main>

    <!-- Booking Modal -->
    <div class="modal-overlay" id="bookingModal">
        <div class="modal glass animate-pop">
            <div class="modal-header">
                <h3>Book a Session</h3>
                <button class="close-btn" id="closeModal">&times;</button>
            </div>
            <div class="modal-body">
                <div class="mentor-summary" id="modalMentorSummary">
                    <!-- Populated by JS -->
                </div>
                
                <form id="bookingForm" class="booking-form">
                    <div class="form-group">
                        <label for="topic">What do you want to focus on?</label>
                        <input type="text" id="topic" required placeholder="e.g. Next.js architecture review">
                    </div>
                    
                    <div class="form-group">
                        <label for="sessionDate">Select Time Slot</label>
                        <input type="datetime-local" id="sessionDate" required>
                    </div>
                    
                    <button type="submit" class="btn-primary w-100 mt-3">Confirm Session</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast glass"></div>

    <script type="module" src="assets/app.js"></script>
</body>
</html>
