<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="MentorMatch - Premium Mentorship Marketplace" />
    <title>MentorMatch - Find Your Perfect Mentor</title>
 
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
 
      html,
      body {
        width: 100%;
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu',
          'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
 
      #root {
        width: 100%;
        height: 100%;
      }
 
      body {
        background: linear-gradient(135deg, #0f172a 0%, #1a1f35 100%);
        min-height: 100vh;
      }
 
      /* Loading spinner for when React hasn't mounted yet */
      .loading-spinner {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        color: #f1f5f9;
      }
 
      .loading-spinner::after {
        content: '';
        display: block;
        width: 40px;
        height: 40px;
        margin: 0 auto 20px;
        border: 4px solid rgba(99, 102, 241, 0.3);
        border-top-color: #6366f1;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
 
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="loading-spinner">Loading MentorMatch...</div>
    </div>
 
    <!-- Vite Module Entry Point -->
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
